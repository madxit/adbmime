name: Package Multiplatform

on:
  push:
    tags:
      - 'Release-*'
  release:
    types: [created, published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.extract_meta.outputs.version }}
      app_name: ${{ steps.extract_meta.outputs.name }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract App Version and Name
        id: extract_meta
        shell: bash
        run: |
          APP_VERSION=$(grep 'val appVersion =' composeApp/build.gradle.kts | sed -E 's/.*\"(.+)\".*/\\1/')
          APP_NAME=$(grep 'val appName =' composeApp/build.gradle.kts | sed -E 's/.*\"(.+)\".*/\\1/')
          echo "version=$APP_VERSION" >> $GITHUB_OUTPUT
          echo "name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "Extracted $APP_NAME version $APP_VERSION"

  build:
    needs: prepare
    name: Package for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            task: packageMsi packageExe createDistributable
            suffix: windows
          - os: macos-latest
            task: packageDmg
            suffix: macos
          - os: ubuntu-latest
            task: packageDeb
            suffix: linux

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build Packages
        run: ./gradlew :composeApp:${{ matrix.task }}

      - name: Collect Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p final-artifacts
          cp composeApp/build/compose/binaries/main/msi/*.msi final-artifacts/${{ needs.prepare.outputs.app_name }}-v${{ needs.prepare.outputs.app_version }}.msi
          cp composeApp/build/compose/binaries/main/exe/*.exe final-artifacts/${{ needs.prepare.outputs.app_name }}-v${{ needs.prepare.outputs.app_version }}.exe

      - name: Collect Artifacts (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p final-artifacts
          cp composeApp/build/compose/binaries/main/dmg/*.dmg final-artifacts/${{ needs.prepare.outputs.app_name }}-v${{ needs.prepare.outputs.app_version }}.dmg

      - name: Collect Artifacts (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.suffix == 'linux'
        shell: bash
        run: |
          mkdir -p final-artifacts
          cp composeApp/build/compose/binaries/main/deb/*.deb final-artifacts/${{ needs.prepare.outputs.app_name }}-v${{ needs.prepare.outputs.app_version }}.deb

      - name: Upload Intermediate Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.suffix }}
          path: final-artifacts/*
